articles:
- title: Basic Use
  desc: >
    Start here. A single-page tour of BFV, CKKS, BinFHE,
    serialization, and the threshold decrypt flow.
  contents:
  - introduction

- title: Advanced
  desc: >
    OpenFHE-specific deep features — CKKS bootstrapping for
    refreshing deep circuits past their multiplicative depth,
    and BinFHE boolean circuits over encrypted bits. The
    statistical-application demos that previously lived here
    (MLE, Cox regression, CVXR consensus ADMM, and their DP
    variants) have been moved to the companion homomorpheR
    package (version >= 1.0), the natural home for
    stats-application demonstrations layered on top of openfhe.R.
  contents:
  - ckks-bootstrapping
  - binfhe-boolean-circuits
